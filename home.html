<!DOCTYPE html>
<html>
<head>
    <title>E-Commerce Store</title>
</head>
<body>

<h1>Simple E-Commerce Store</h1>

{% for product in products %}

<div style="border:1px solid black;padding:10px;margin:10px;">
    <img src="{{ product.image }}" width="200">
    <h2>{{ product.name }}</h2>
    <p>{{ product.description }}</p>
    <h3>₹{{ product.price }}</h3>
</div>

{% endfor %}

</body>
</html>
